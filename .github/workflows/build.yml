name: Build and Release

on:
  
  push:
    tags:
      - '*'
permissions:
  contents: write
jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter upgrade

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libgtk-3-dev \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          liblzma-dev \
          libmpv-dev  
      - run: flutter pub get
      - run: flutter build linux

      - name: Archive Linux Build
        run: tar -czf scloud-linux-x64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-linux-x64
          path: scloud-linux-x64.tar.gz
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter upgrade

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libgtk-3-dev \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          liblzma-dev \
          libmpv-dev  
      - run: flutter pub get
      - run: flutter build linux

      - name: Archive Linux Build
        run: tar -czf scloud-linux-arm64.tar.gz -C build/linux/arm64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-linux-arm64
          path: scloud-linux-arm64.tar.gz
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter upgrade
      - run: flutter pub get
      - run: flutter build windows

      - name: Archive Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath scloud-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-windows
          path: scloud-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter upgrade
      - run: flutter pub get
      - run: flutter build macos

      - name: Archive macOS Build
        run: zip -r scloud-macos.zip build/macos/Build/Products/Release

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-macos
          path: scloud-macos.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter pub get
      - run: flutter build apk
      - name: Rename apk
        run: mv build/app/outputs/flutter-apk/app-release.apk scloud.apk

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-android
          path: build/app/outputs/flutter-apk/scloud.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel : stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Archive iOS Build
        run: zip -r scloud-ios.zip build/ios/iphoneos

      - uses: actions/upload-artifact@v4
        with:
          name: scloud-ios
          path: scloud-ios.zip

  publish:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-windows
      - build-macos
      - build-android
      - build-ios
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            artifacts/scloud-linux-x64/scloud-linux-x64.tar.gz
            artifacts/scloud-linux-arm64/scloud-linux-arm64.tar.gz
            artifacts/scloud-windows/scloud-windows.zip
            artifacts/scloud-macos/scloud-macos.zip
            artifacts/scloud-android/scloud.apk
            artifacts/scloud-ios/scloud-ios.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
