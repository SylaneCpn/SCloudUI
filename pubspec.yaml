name: scloud_ui
description: "User interface for the SCloud project."
publish_to: 'none'
version: 1.0.6+1

environment:
  sdk: ^3.11.1

dependencies:
  collection: ^1.19.1
  dio: ^5.9.2
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_highlighting: ^0.9.0+11.8.0
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  pdfrx: ^2.2.24
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  rename_app: ^1.6.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/img/
  fonts:
    - family: Rubik
      fonts:
        - asset: fonts/Rubik-Regular.ttf
    - family: IndieFlower
      fonts:
        - asset: fonts/IndieFlower-Regular.ttf